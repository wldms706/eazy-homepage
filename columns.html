    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a1a2e;
            --accent: #2A5FFF;
            --bg-dark: #111111;
            --text: #1a1a1a;
            --text-sub: #888888;
            --text-light: #aaaaaa;
            --border: #EBEBEB;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Noto Sans KR', -apple-system, sans-serif;
            color: var(--text); line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden; word-break: keep-all; background: #fff;
        }
        a { text-decoration: none; color: inherit; }

        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .header-inner {
            max-width: 1200px; margin: 0 auto; padding: 0 24px;
            height: 64px; display: flex; align-items: center; justify-content: space-between;
        }
        .logo { font-size: 1.4rem; font-weight: 900; color: var(--text); }
        .nav { display: flex; gap: 32px; }
        .nav a { font-size: 0.9rem; font-weight: 500; color: var(--text-sub); transition: color 0.2s; }
        .nav a:hover { color: var(--text); }
        .header-cta {
            font-size: 0.85rem; font-weight: 700; color: #fff;
            background: var(--accent); padding: 8px 20px; border-radius: 8px;
        }

        .page-hero {
            padding: 120px 24px 60px; text-align: center;
        }
        .page-hero .tag {
            font-size: 0.8rem; font-weight: 700; color: var(--accent);
            letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px;
        }
        .page-hero h1 {
            font-size: clamp(1.8rem, 4vw, 2.5rem); font-weight: 900;
            line-height: 1.3; margin-bottom: 12px;
        }
        .page-hero p {
            font-size: 1rem; color: var(--text-sub); max-width: 500px; margin: 0 auto;
        }

        .notion-wrap {
            max-width: 900px; margin: 0 auto; padding: 0 24px 80px;
        }
        .notion-wrap iframe {
            width: 100%; min-height: calc(100vh - 300px); border: none; border-radius: 12px;
        }

        .footer {
            background: var(--bg-dark); color: rgba(255,255,255,0.4);
            padding: 40px 24px; text-align: center; font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .nav { display: none; }
            .header-cta { display: none; }
        }
